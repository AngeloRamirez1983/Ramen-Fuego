<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramen & Fuego</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
.container{padding:20px}
button{padding:10px;border:none;border-radius:6px;cursor:pointer}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="container">
<h2>Ingreso</h2>
<input id="user" placeholder="Usuario"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="login()">Ingresar</button>
</div>

<!-- APP -->
<div id="app" style="display:none" class="container">

<h2>Ramen & Fuego</h2>
<p>Atendido por: <strong id="usuarioActivo"></strong></p>

<input id="cliente" placeholder="Nombre cliente"><br><br>
<input id="direccion" placeholder="Dirección"><br><br>

<select id="comuna">
<option value="1000">El Rincón</option>
<option value="2500">Codegua</option>
<option value="4000">Graneros</option>
</select><br><br>

<button onclick="addItem('Ramen Pollo',5000,'pollo')">Ramen Pollo</button>
<button onclick="addItem('Ramen Cerdo',5000,'cerdo')">Ramen Cerdo</button>

<h3>Pedido</h3>
<ul id="lista"></ul>

<p>Total: $<span id="total">0</span></p>

<button onclick="finalizar()">Finalizar</button>
<button onclick="reimprimir()">Reimprimir último</button>

</div>

<script>

// 🔥 USUARIOS
const usuarios = {
  "Exequiel":"190309",
  "Ana María":"170783",
  "Angelo":"010783"
};

let usuarioActual = null;
let pedido = [];
let lastOrder = null;
let printingInProgress = false;

// 🔐 LOGIN
function login(){
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  if(usuarios[u] && usuarios[u]===p){
    usuarioActual = u;
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("usuarioActivo").innerText = u;
  } else {
    alert("Datos incorrectos");
  }
}

// 🧾 AGREGAR ITEM
function addItem(nombre,precio,tipo){
  pedido.push({nombre,precio,tipo});
  render();
}

function render(){
  const lista = document.getElementById("lista");
  lista.innerHTML="";
  let total=0;

  pedido.forEach(p=>{
    lista.innerHTML += `<li>${p.nombre} $${p.precio}</li>`;
    total+=p.precio;
  });

  document.getElementById("total").innerText = total;
}

// 🔒 PROTECCIÓN
window.addEventListener("beforeunload",function(e){
  if(pedido.length>0 || printingInProgress){
    e.preventDefault();
    e.returnValue="";
  }
});

// 💰 FINALIZAR
async function finalizar(){

  if(printingInProgress) return alert("Imprimiendo...");

  if(pedido.length===0) return alert("Sin pedido");

  const order={
    cliente:document.getElementById("cliente").value,
    direccion:document.getElementById("direccion").value,
    comuna:document.getElementById("comuna").value,
    atendido:usuarioActual,
    items:[...pedido],
    total:pedido.reduce((a,b)=>a+b.precio,0)
  };

  lastOrder = order;

  printingInProgress=true;

  await imprimir(order);

  pedido=[];
  render();

  setTimeout(()=>printingInProgress=false,3000);
}

// 🧾 REIMPRIMIR
function reimprimir(){
  if(!lastOrder) return alert("No hay ticket");
  imprimir(lastOrder);
}

// 🖨️ TICKET 58MM
async function imprimir(order){

  const {jsPDF}=window.jspdf;

  const doc=new jsPDF({
    orientation:"portrait",
    unit:"mm",
    format:[58,200]
  });

  let y=5;

  doc.setFontSize(10);
  doc.text("RAMEN & FUEGO",29,y,{align:"center"});
  y+=5;

  doc.setFontSize(8);
  doc.text(`Atiende: ${order.atendido}`,2,y); y+=4;
  doc.text(`Cliente: ${order.cliente}`,2,y); y+=4;
  doc.text(`Dir: ${order.direccion}`,2,y); y+=4;

  y+=2;

  order.items.forEach(i=>{
    doc.text(i.nombre,2,y);
    doc.text("$"+i.precio,56,y,{align:"right"});
    y+=4;
  });

  y+=2;
  doc.text("TOTAL",2,y);
  doc.text("$"+order.total,56,y,{align:"right"});
  y+=6;

  doc.text("Gracias 🔥",29,y,{align:"center"});

  const blob = doc.output("blob");

  const url = URL.createObjectURL(blob);
  const win = window.open(url);

  win.onload=()=>setTimeout(()=>win.print(),500);
}

</script>

</body>
</html>
